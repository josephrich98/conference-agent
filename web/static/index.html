<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conference Agent</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --border: #e2e6eb;
      --text: #1f2933;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-weak: #eff4ff;
      --large: #16a34a;
      --medium: #ea580c;
      --small: #1f2933;
      --date-recent: #dc2626;
      --date-old: #ea580c;
      --date-soon: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      padding: 20px 24px 8px;
    }
    h1 { font-size: 20px; margin: 0 0 2px; }
    .subtitle { color: var(--muted); font-size: 13px; margin: 0; }
    .controls {
      padding: 8px 24px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    #query {
      flex: 1 1 420px;
      min-width: 260px;
      padding: 9px 12px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .ai-controls { padding-bottom: 0; }
    #nl-query {
      flex: 1 1 420px;
      min-width: 260px;
      padding: 9px 12px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    #nl-btn[disabled] { opacity: 0.6; cursor: default; }
    .nl-status { color: var(--muted); font-size: 12px; flex: 1 1 100%; min-height: 14px; }
    .nl-status.err { color: var(--date-recent); }
    button {
      padding: 9px 14px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      cursor: pointer;
    }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button:hover { filter: brightness(0.98); }
    .columns-menu { position: relative; }
    #columns-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 10;
      min-width: 200px;
      padding: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.12);
    }
    #columns-panel[hidden] { display: none; }
    #columns-panel .col-actions {
      display: flex;
      gap: 8px;
      padding: 4px 6px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    #columns-panel .col-actions a { color: var(--accent); cursor: pointer; font-size: 12px; }
    #columns-panel label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    #columns-panel label:hover { background: var(--accent-weak); }
    .syntax {
      padding: 0 24px 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .syntax code {
      background: var(--accent-weak);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }
    #help-toggle { color: var(--accent); cursor: pointer; text-decoration: underline; }
    #fields-help {
      display: none;
      margin: 8px 0 0;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      max-width: 900px;
    }
    #fields-help table { border-collapse: collapse; font-size: 12px; }
    #fields-help td { padding: 2px 12px 2px 0; vertical-align: top; }
    #fields-help .fname { font-family: ui-monospace, monospace; color: var(--text); }
    #status { padding: 0 24px 8px; color: var(--muted); font-size: 13px; min-height: 18px; }
    .table-wrap { padding: 0 24px 40px; overflow-x: auto; }
    table.results {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 13px;
    }
    table.results th, table.results td {
      text-align: left;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    table.results th {
      background: #fafbfc;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    table.results th .arrow { color: var(--accent); font-size: 11px; }
    table.results tr:last-child td { border-bottom: none; }
    .conf-name { font-weight: 600; }
    .conf-name a { color: var(--accent); text-decoration: none; }
    .conf-name a:hover { text-decoration: underline; }
    /* A date is colored by how it sits relative to a three-month window around
       today: green when it falls from today through three months ahead (coming up
       soon), red when it passed within the last three months (recently missed),
       and orange when it is more than three months in the past (long gone). Dates
       further than three months out are left uncolored. This is judged purely by
       the date itself, not by whether it came from a prior or upcoming edition. */
    .date-recent { color: var(--date-recent); }
    .date-old { color: var(--date-old); }
    .date-soon { color: var(--date-soon); }
    .size { font-weight: 600; text-transform: capitalize; }
    .size.large { color: var(--large); }
    .size.medium { color: var(--medium); }
    .size.small { color: var(--small); }
    .muted { color: var(--muted); }
    .cat-tag {
      display: inline-block;
      background: var(--accent-weak);
      color: var(--text);
      border-radius: 4px;
      padding: 1px 6px;
      margin: 1px 3px 1px 0;
      font-size: 12px;
      white-space: nowrap;
    }
    .nobreak { white-space: nowrap; }
    .cal-cell { white-space: nowrap; }
    .cal-btn {
      display: inline-block;
      padding: 5px 10px;
      font-size: 13px;
      white-space: nowrap;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
    }
    .cal-btn:hover { filter: brightness(0.98); }
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      max-width: 360px;
      padding: 12px 16px;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { background: #15803d; }
    #toast.err { background: #b91c1c; }
  </style>
  <style id="col-style"></style>
</head>
<body>
  <header>
    <h1>Conference Agent</h1>
    <p class="subtitle">Curated conference deadlines and dates. Search the table, or add any row to your calendar (.ics).</p>
  </header>

  <div class="controls ai-controls">
    <input id="nl-query" type="text" placeholder='Ask in plain English — e.g.  big virtual radiology conferences with an abstract deadline after June 2026' autocomplete="off" />
    <button class="primary" id="nl-btn">✨ AI search</button>
    <span id="nl-status" class="nl-status"></span>
  </div>

  <div class="controls">
    <input id="query" type="text" placeholder='e.g.  (virtual OR hybrid) AND size:large' autocomplete="off" />
    <button class="primary" id="search-btn">Search</button>
    <div class="columns-menu">
      <button id="columns-btn" title="Choose which columns are visible">Columns ▾</button>
      <div id="columns-panel" hidden>
        <div class="col-actions">
          <a id="columns-all">Select all</a>
          <a id="columns-none">Hide all</a>
        </div>
        <div id="columns-list"></div>
      </div>
    </div>
    <button id="csv-btn">Export CSV</button>
  </div>

  <div class="syntax">
    Boolean search:
    <code>category:medicine</code>
    <code>subcategory:radiology</code>
    <code>size:large</code>
    <code>(virtual OR hybrid) AND cost:*</code>
    <code>conference_dates:&gt;=2026-06-01</code>
    <code>NOT abstract_due:*</code>
    &nbsp;·&nbsp;<span id="help-toggle">show fields</span>
    <div id="fields-help"></div>
  </div>

  <div id="status"></div>

  <div class="table-wrap">
    <table class="results">
      <thead>
        <tr id="header-row"></tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>

  <div id="toast"></div>

  <script src="search.js"></script>
  <script src="calendar.js"></script>
  <script src="nl_query.js"></script>
  <script>
    const COLUMNS = [
      { key: "conference", label: "Conference", sort: "acronym" },
      { key: "category", label: "Category", sort: "category" },
      { key: "subcategory", label: "Subcategory", sort: "subcategory" },
      { key: "format", label: "Format", sort: "format" },
      { key: "location", label: "Location", sort: "location" },
      { key: "size", label: "Size", sort: "size" },
      { key: "attendance", label: "Attendance", sort: "attendance" },
      { key: "remote_option", label: "Remote", sort: "remote_option" },
      { key: "cost", label: "Cost", sort: null },
      { key: "abstract_month", label: "Abstract month", sort: "abstract_month" },
      { key: "upcoming_abstract_deadline", label: "Abstract due", sort: "upcoming_abstract_deadline" },
      { key: "paper_month", label: "Paper month", sort: "paper_month" },
      { key: "upcoming_paper_deadline", label: "Paper due", sort: "upcoming_paper_deadline" },
      { key: "conference_month", label: "Conference month", sort: "conference_month" },
      { key: "upcoming_dates", label: "Conference dates", sort: "upcoming_start_date" },
      { key: "registration", label: "Registration", sort: null },
      { key: "cal", label: "Calendar", sort: null },
    ];

    let state = { sort: "upcoming_start_date", order: "asc", rows: [] };

    // The full catalog snapshot, loaded once from the static JSON. All search,
    // sort, CSV export, and .ics generation run in the browser over this — there
    // is no backend to query, so the site can be hosted as static files with no
    // per-request cost.
    let DATA = { conferences: [], columns: [], fields: [], byId: {} };

    const $ = (id) => document.getElementById(id);

    // Column visibility. Columns default to all-visible; the user's choice is
    // persisted as the set of hidden keys. A single <style> element hides cells by
    // data-col, so the rule survives table re-renders without re-touching the DOM.
    const COLS_KEY = "conference-agent.hidden-columns";
    let hiddenCols = new Set();
    try {
      const stored = JSON.parse(localStorage.getItem(COLS_KEY) || "[]");
      hiddenCols = new Set(stored.filter((k) => COLUMNS.some((c) => c.key === k)));
    } catch (e) { /* ignore malformed storage */ }

    function applyColumnVisibility() {
      const rules = [...hiddenCols]
        .map((k) => `[data-col="${k}"] { display: none; }`)
        .join("\n");
      $("col-style").textContent = rules;
      try {
        localStorage.setItem(COLS_KEY, JSON.stringify([...hiddenCols]));
      } catch (e) { /* ignore storage errors */ }
    }

    function renderColumnsMenu() {
      const list = $("columns-list");
      list.innerHTML = "";
      for (const col of COLUMNS) {
        const label = document.createElement("label");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !hiddenCols.has(col.key);
        cb.addEventListener("change", () => {
          if (cb.checked) hiddenCols.delete(col.key);
          else hiddenCols.add(col.key);
          applyColumnVisibility();
        });
        label.appendChild(cb);
        label.appendChild(document.createTextNode(col.label));
        list.appendChild(label);
      }
    }

    function setAllColumns(visible) {
      hiddenCols = visible ? new Set() : new Set(COLUMNS.map((c) => c.key));
      applyColumnVisibility();
      renderColumnsMenu();
    }

    // Local YYYY-MM-DD for a Date. ISO date strings compare lexicographically, so
    // building all thresholds the same way lets us compare them as plain strings.
    function ymd(d) {
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${d.getFullYear()}-${m}-${day}`;
    }
    // Full month names indexed 1-12 (index 0 unused), for the derived month columns.
    const MONTHS = ["", "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"];
    function monthCell(n) {
      return (n >= 1 && n <= 12) ? MONTHS[n] : '<span class="muted">—</span>';
    }

    const NOW = new Date();
    const TODAY = ymd(NOW);
    const THREE_MONTHS_AGO = ymd(new Date(NOW.getFullYear(), NOW.getMonth() - 3, NOW.getDate()));
    const THREE_MONTHS_AHEAD = ymd(new Date(NOW.getFullYear(), NOW.getMonth() + 3, NOW.getDate()));

    // CSS class for a date relative to a three-month window around today:
    //   orange  — more than three months in the past (long gone)
    //   red     — within the last three months (recently passed)
    //   green   — from today through three months ahead (coming up soon)
    //   ""      — more than three months out, left uncolored
    function dateClass(date) {
      if (!date) return "";
      if (date < THREE_MONTHS_AGO) return "date-old";
      if (date < TODAY) return "date-recent";
      if (date <= THREE_MONTHS_AHEAD) return "date-soon";
      return "";
    }

    function dateRange(start, end) {
      if (!start) return '<span class="muted">—</span>';
      if (end && end !== start) return `<span class="nobreak">${start}</span> – <span class="nobreak">${end}</span>`;
      return `<span class="nobreak">${start}</span>`;
    }

    // Wrap a rendered date value, coloring it by how its (start) date sits
    // relative to today (see dateClass). The coloring is judged purely by the date
    // itself, not by which edition it came from.
    function dateSpan(inner, refDate) {
      const dc = dateClass(refDate);
      const cls = dc ? ` class="${dc}"` : "";
      return `<span${cls}>${inner}</span>`;
    }

    function dateOrPrior(upcoming, prior) {
      const value = upcoming || prior;
      if (value) return dateSpan(value, value);
      return '<span class="muted">—</span>';
    }

    function rangeOrPrior(upStart, upEnd, prStart, prEnd) {
      const [start, end] = upStart ? [upStart, upEnd] : [prStart, prEnd];
      if (start) return dateSpan(dateRange(start, end), start);
      return '<span class="muted">—</span>';
    }

    // Escape free-text values (e.g. researched registration windows) before
    // inserting them as HTML, since they can contain & or < / >.
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    // Registration is free text: show the upcoming edition's value, falling back
    // to the prior edition's, else a muted dash.
    function textOrPrior(upcoming, prior) {
      const value = upcoming || prior;
      return value ? escapeHtml(value) : '<span class="muted">—</span>';
    }

    // Some stored URLs are bare domains (e.g. "rsna.org/annual-meeting"); without
    // a scheme the browser treats the href as a relative path and the link 404s.
    // Default to https:// when no scheme is present.
    function externalUrl(url) {
      return /^https?:\/\//i.test(url) ? url : `https://${url}`;
    }

    function renderHeader() {
      const row = $("header-row");
      row.innerHTML = "";
      for (const col of COLUMNS) {
        const th = document.createElement("th");
        th.dataset.col = col.key;
        let arrow = "";
        if (col.sort && col.sort === state.sort) {
          arrow = ` <span class="arrow">${state.order === "asc" ? "▲" : "▼"}</span>`;
        }
        th.innerHTML = col.label + arrow;
        if (col.sort) {
          th.addEventListener("click", () => {
            if (state.sort === col.sort) {
              state.order = state.order === "asc" ? "desc" : "asc";
            } else {
              state.sort = col.sort;
              state.order = "asc";
            }
            search();
          });
        } else {
          th.style.cursor = "default";
        }
        row.appendChild(th);
      }
    }

    function renderRows(rows) {
      const body = $("results-body");
      body.innerHTML = "";
      if (rows.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="${COLUMNS.length}" class="muted">No conferences match.</td>`;
        body.appendChild(tr);
        return;
      }
      for (const r of rows) {
        const tr = document.createElement("tr");

        // The URL hyperlinks the acronym, with the full name in plain text after
        // it. When the row has no distinct acronym (none stored, or it equals the
        // name), the link wraps the full name instead and the dash is dropped.
        const acronym = (r.acronym || "").trim();
        const fullName = (r.name || "").trim();
        const hasAcronym = acronym && acronym.toLowerCase() !== fullName.toLowerCase();
        const linkText = hasAcronym ? acronym : (fullName || acronym);
        const linked = r.url
          ? `<a href="${externalUrl(r.url)}" target="_blank" rel="noopener">${linkText}</a>`
          : linkText;
        const name = hasAcronym ? `${linked} — ${fullName}` : linked;

        const sizeHtml = r.size
          ? `<span class="size ${r.size}">${r.size}</span>`
          : '<span class="muted">—</span>';

        // Attendance figure with the year it describes in parentheses, e.g.
        // "45,000 (2025)". The size bucket above is derived from this number.
        const attendanceHtml = (r.attendance != null)
          ? `${Number(r.attendance).toLocaleString()}${r.attendance_year ? ` (${r.attendance_year})` : ""}`
          : '<span class="muted">—</span>';

        // Category (the broad bucket, derived) and subcategory (the specific
        // field) are both multi-valued; render each as comma-split tags.
        const cats = (r.category || "").split(",").map((s) => s.trim()).filter(Boolean);
        const catHtml = cats.length
          ? cats.map((c) => `<span class="cat-tag">${c}</span>`).join("")
          : '<span class="muted">—</span>';

        const subcats = (r.subcategory || "").split(",").map((s) => s.trim()).filter(Boolean);
        const subcatHtml = subcats.length
          ? subcats.map((c) => `<span class="cat-tag">${c}</span>`).join("")
          : '<span class="muted">—</span>';

        // Submission/presentation formats (abstract, paper, poster, oral),
        // rendered as tags like the category column.
        const fmts = (r.format || "").split(",").map((s) => s.trim()).filter(Boolean);
        const formatHtml = fmts.length
          ? fmts.map((f) => `<span class="cat-tag">${f}</span>`).join("")
          : '<span class="muted">—</span>';

        tr.innerHTML = `
          <td data-col="conference"><div class="conf-name">${name}</div></td>
          <td data-col="category">${catHtml}</td>
          <td data-col="subcategory">${subcatHtml}</td>
          <td data-col="format">${formatHtml}</td>
          <td data-col="location">${r.location || '<span class="muted">—</span>'}</td>
          <td data-col="size">${sizeHtml}</td>
          <td data-col="attendance" class="nobreak">${attendanceHtml}</td>
          <td data-col="remote_option">${(r.remote_option && r.remote_option !== "unknown") ? r.remote_option : '<span class="muted">—</span>'}</td>
          <td data-col="cost">${r.cost || '<span class="muted">—</span>'}</td>
          <td data-col="abstract_month" class="nobreak">${monthCell(r.abstract_month)}</td>
          <td data-col="upcoming_abstract_deadline">${dateOrPrior(r.upcoming_abstract_deadline, r.prior_abstract_deadline)}</td>
          <td data-col="paper_month" class="nobreak">${monthCell(r.paper_month)}</td>
          <td data-col="upcoming_paper_deadline">${dateOrPrior(r.upcoming_paper_deadline, r.prior_paper_deadline)}</td>
          <td data-col="conference_month" class="nobreak">${monthCell(r.conference_month)}</td>
          <td data-col="upcoming_dates">${rangeOrPrior(r.upcoming_start_date, r.upcoming_end_date, r.prior_start_date, r.prior_end_date)}</td>
          <td data-col="registration">${textOrPrior(r.upcoming_registration, r.prior_registration)}</td>
          <td data-col="cal" class="cal-cell">
            <button class="cal-btn" data-conf-id="${escapeHtml(r.id)}" title="Download this conference's deadlines and dates as a calendar (.ics) file">📅 cal</button>
          </td>
        `;
        body.appendChild(tr);
      }
    }

    // Run the active query over the in-memory catalog. Filtering and sorting both
    // mirror the former server endpoints (see search.js / the old /api/search).
    function search() {
      renderHeader();
      const q = $("query").value;
      let predicate;
      try {
        predicate = ConferenceSearch.buildPredicate(q);
      } catch (e) {
        // QueryError — surface the message like the API's 400 detail.
        $("status").textContent = `Query error: ${e.message}`;
        renderRows([]);
        return;
      }
      const filtered = predicate ? DATA.conferences.filter(predicate) : DATA.conferences;
      const rows = ConferenceSearch.sortRows(filtered, state.sort, state.order);
      state.rows = rows;
      $("status").textContent = `${rows.length} conference${rows.length === 1 ? "" : "s"}.`;
      renderRows(rows);
    }

    // Export the current result set as CSV, matching the columns and order the
    // server CSV used (DATA.columns, taken from the snapshot).
    function csvField(value) {
      if (value === null || value === undefined) return "";
      const s = String(value);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }

    function exportCsv() {
      const cols = DATA.columns;
      const lines = [cols.join(",")];
      for (const r of state.rows) {
        lines.push(cols.map((c) => csvField(r[c])).join(","));
      }
      const blob = new Blob([lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "conferences.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }

    function toast(msg, ok) {
      const t = $("toast");
      t.textContent = msg;
      t.className = `show ${ok ? "ok" : "err"}`;
      setTimeout(() => { t.className = ""; }, 4000);
    }

    // Load the catalog snapshot once, then run the initial search. All later
    // searches filter this in memory.
    async function loadData() {
      $("status").textContent = "Loading…";
      try {
        const resp = await fetch("data/conferences.json");
        if (!resp.ok) throw new Error(resp.statusText);
        const payload = await resp.json();
        DATA.conferences = payload.conferences || [];
        DATA.columns = payload.columns || [];
        DATA.fields = payload.fields || [];
        DATA.byId = {};
        for (const r of DATA.conferences) DATA.byId[r.id] = r;
        renderFields(DATA.fields);
        search();
      } catch (e) {
        $("status").textContent = `Failed to load catalog: ${e.message || e}`;
      }
    }

    function renderFields(fields) {
      try {
        const rows = fields
          .map(({ field, type }) =>
            `<tr><td class="fname">${field}</td><td class="muted">(${type})</td></tr>`)
          .join("");
        $("fields-help").innerHTML =
          `<p class="muted" style="margin:0 0 6px">Search fields match the table columns:</p>` +
          `<table>${rows}</table>` +
          `<p class="muted" style="margin:10px 0 4px">Size color coding (by annual attendance):</p>` +
          `<table>` +
            `<tr><td><span class="size large">large</span></td><td class="muted">1,000+ attendees</td></tr>` +
            `<tr><td><span class="size medium">medium</span></td><td class="muted">100–999 attendees</td></tr>` +
            `<tr><td><span class="size small">small</span></td><td class="muted">under 100 attendees</td></tr>` +
          `</table>` +
          `<p class="muted" style="margin:10px 0 4px">Date color coding (relative to today):</p>` +
          `<table>` +
            `<tr><td><span class="date-soon">green</span></td><td class="muted">upcoming within 3 months</td></tr>` +
            `<tr><td><span>(plain)</span></td><td class="muted">upcoming more than 3 months out</td></tr>` +
            `<tr><td><span class="date-recent">red</span></td><td class="muted">past within the last 3 months</td></tr>` +
            `<tr><td><span class="date-old">orange</span></td><td class="muted">past more than 3 months ago</td></tr>` +
          `</table>`;
      } catch (e) { /* non-fatal */ }
    }

    // Natural-language ("AI") search. Translates the plain-English request into
    // a boolean query with a small model that runs entirely in the browser over
    // WebGPU (web/static/nl_query.js), then fills the boolean box and searches.
    // The model (~1 GB) loads lazily on first use and is cached afterward, so
    // there is no backend and no per-request cost — matching the static site.
    function setNlStatus(msg, isErr) {
      const el = $("nl-status");
      el.textContent = msg || "";
      el.className = `nl-status${isErr ? " err" : ""}`;
    }

    let nlBusy = false;
    async function nlSearch() {
      if (nlBusy) return;
      const text = $("nl-query").value.trim();
      if (!text) return;
      if (!window.ConferenceNL || !ConferenceNL.isSupported()) {
        setNlStatus(
          "AI search needs WebGPU (try a recent Chrome or Edge). Use the boolean box below instead.",
          true
        );
        return;
      }
      nlBusy = true;
      const btn = $("nl-btn");
      btn.disabled = true;
      setNlStatus("Preparing the AI model… (first use downloads ~1 GB, then it is cached)");
      try {
        const { query, repaired } = await ConferenceNL.translate(text, DATA.fields, {
          onProgress: (textMsg, progress) => {
            const pct = typeof progress === "number" ? ` (${Math.round(progress * 100)}%)` : "";
            setNlStatus(`Loading AI model…${pct}`);
          },
        });
        $("query").value = query;
        search();
        setNlStatus(
          query
            ? `Translated to: ${query}${repaired ? "  (auto-corrected)" : ""}`
            : "No specific filters detected — showing all conferences."
        );
      } catch (e) {
        setNlStatus(`AI search failed: ${e.message || e}`, true);
      } finally {
        nlBusy = false;
        btn.disabled = false;
      }
    }

    $("nl-btn").addEventListener("click", nlSearch);
    $("nl-query").addEventListener("keydown", (e) => { if (e.key === "Enter") nlSearch(); });

    $("search-btn").addEventListener("click", search);
    $("csv-btn").addEventListener("click", exportCsv);
    // Per-row calendar download (delegated, since rows re-render on each search).
    $("results-body").addEventListener("click", (e) => {
      const btn = e.target.closest(".cal-btn");
      if (!btn) return;
      const row = DATA.byId[btn.dataset.confId];
      if (row) ConferenceCalendar.downloadIcs(row);
    });
    $("columns-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      $("columns-panel").hidden = !$("columns-panel").hidden;
    });
    $("columns-all").addEventListener("click", () => setAllColumns(true));
    $("columns-none").addEventListener("click", () => setAllColumns(false));
    // Close the columns dropdown when clicking outside it.
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".columns-menu")) $("columns-panel").hidden = true;
    });
    $("query").addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });
    $("help-toggle").addEventListener("click", () => {
      const h = $("fields-help");
      const showing = h.style.display === "block";
      h.style.display = showing ? "none" : "block";
      $("help-toggle").textContent = showing ? "show fields" : "hide fields";
    });

    renderColumnsMenu();
    applyColumnVisibility();
    loadData();
  </script>
</body>
</html>
