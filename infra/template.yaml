AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  conference-agent web service: a FastAPI app on AWS Lambda, fronted by a
  CloudFront distribution (Origin Access Control over an IAM-protected Function
  URL) and backed by an RDS PostgreSQL database. The Lambda and the database
  share a VPC; by default the database is reachable only from the Lambda's
  security group. Set DbAdminCidr to also reach it from your IP for data loading.
  Set DomainName + AcmCertificateArn to serve on a custom domain.

Parameters:
  DBName:
    Type: String
    Default: conferences
    Description: Initial PostgreSQL database name.
  DBUsername:
    Type: String
    Default: conf_admin
    Description: Master username for the database.
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: >
      Master password. Use only URL-safe characters (letters, digits, -_.~) so
      it embeds cleanly in the SQLAlchemy connection string.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to place the Lambda and database in (your default VPC is fine).
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Two or more subnets in the VPC (different AZs) for Lambda + RDS.
  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: RDS instance size.
  DBAllocatedStorage:
    Type: Number
    Default: 20
    Description: Database storage in GiB.
  DbAdminCidr:
    Type: String
    Default: ""
    Description: >
      Optional. A CIDR (e.g. 203.0.113.4/32) allowed to reach the database on
      5432 for loading data from your laptop. Leave empty to keep the database
      private to the Lambda. When set, the instance is made publicly accessible.
  DomainName:
    Type: String
    Default: ""
    Description: >
      Optional. A custom domain for the site (e.g. conferences.example.com).
      Leave empty to serve on the default CloudFront *.cloudfront.net URL. When
      set, you must also provide AcmCertificateArn (an ACM cert in us-east-1
      covering this name) and point the name's DNS at the CloudFront domain.
  AcmCertificateArn:
    Type: String
    Default: ""
    # Empty (no custom domain) or a us-east-1 ACM certificate ARN.
    AllowedPattern: '^$|^arn:aws[a-zA-Z-]*:acm:[a-z0-9-]+:\d{12}:certificate/.+$'
    Description: >
      Optional. ARN of an ACM certificate (must be in us-east-1, CloudFront's
      region) covering DomainName. Required only when DomainName is set.
  ReservedConcurrency:
    Type: Number
    Default: 0
    MinValue: 0
    Description: >
      Maximum number of Lambda invocations that can run at once, capping the
      blast radius (and worst-case spend) of a request flood. 0 leaves it unset:
      reserving concurrency requires the account's total Lambda concurrency limit
      to be well above this value (a new account starts at 10, which already caps
      the function and leaves no room to reserve). Set a positive value only
      after raising the account quota via Service Quotas.
  WafRateLimitPer5Min:
    Type: Number
    Default: 2000
    MinValue: 10
    Description: >
      WAF rate-based rule threshold: requests allowed per rolling 5-minute window
      per client IP before that IP is temporarily blocked. 2000 ≈ 6.6 req/s
      sustained per IP — generous for a browser, hostile to a tight loop.
  MonthlyBudgetUsd:
    Type: Number
    Default: 20
    MinValue: 1
    Description: Monthly cost threshold (USD) for the budget alert.
  AlertEmail:
    Type: String
    Default: ""
    Description: >
      Optional. Email address to notify when actual or forecast spend crosses
      MonthlyBudgetUsd. Leave empty to skip creating the budget alarm.
  GaMeasurementId:
    Type: String
    Default: ""
    AllowedPattern: '^$|^G-[A-Za-z0-9]+$'
    Description: >
      Optional. Google Analytics 4 measurement id (e.g. G-XXXXXXXXXX) injected
      into the served pages by the Lambda. Leave empty to serve without analytics.
      Only this AWS deployment carries analytics; the public Vercel static site
      never does (it copies index.html verbatim).
  EnableScheduledRefresh:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      When "true", provision the EventBridge Scheduler + refresh Lambda (and the
      NAT gateway the in-VPC function needs for outbound Anthropic API calls) that
      replace the retired GitHub Actions cron. While deployed, cost is dominated
      by the NAT gateway (~$0.045/hr) — negligible for a short demo that is then
      torn down. The default "false" keeps a normal deploy to just the web stack.
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Anthropic API key for the scheduled-refresh Lambda's discovery (api
      backend). Required only when EnableScheduledRefresh is "true".
  RefreshWeeklyScheduleExpression:
    Type: String
    Default: "cron(0 7 ? * MON *)"
    Description: >
      EventBridge Scheduler expression (UTC) for the weekly flagship-field
      refresh. Default: 07:00 every Monday — mirrors the old weekly_update.yml.
  RefreshMonthlyScheduleExpression:
    Type: String
    Default: "cron(0 7 1 * ? *)"
    Description: >
      EventBridge Scheduler expression (UTC) for the monthly refresh of the
      remaining fields. Default: 07:00 on the 1st — mirrors monthly_update.yml.
  RefreshDailyScheduleExpression:
    Type: String
    Default: "cron(0 6 * * ? *)"
    Description: >
      EventBridge Scheduler expression (UTC) for the daily targeted auto-check
      ("due" cadence) — re-discovers only series whose next edition is plausibly
      about to be announced. Default: 06:00 daily — mirrors auto_check.yml.

Conditions:
  ExposeDb: !Not [!Equals [!Ref DbAdminCidr, ""]]
  ScheduledRefresh: !Equals [!Ref EnableScheduledRefresh, "true"]
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, ""]]
  HasReservedConcurrency: !Not [!Equals [!Ref ReservedConcurrency, 0]]

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12

Resources:
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: conference-agent Lambda egress
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all egress (Lambda reaches RDS in-VPC)

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: conference-agent RDS access
      VpcId: !Ref VpcId

  DBIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt DBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !GetAtt LambdaSecurityGroup.GroupId
      Description: PostgreSQL from the Lambda security group only

  DBIngressFromAdmin:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: ExposeDb
    Properties:
      GroupId: !GetAtt DBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      CidrIp: !Ref DbAdminCidr
      Description: PostgreSQL from the admin CIDR (for data loading)

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: conference-agent database subnets
      SubnetIds: !Ref SubnetIds

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: postgres
      # EngineVersion intentionally unset: RDS uses the region's current default
      # major version, which is always a valid (non-deprecated) choice.
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      PubliclyAccessible: !If [ExposeDb, true, false]
      BackupRetentionPeriod: 1
      StorageEncrypted: true
      MultiAZ: false

  ConferenceFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: web.handler.handler
      Description: conference-agent FastAPI app (table UI + boolean search API)
      Architectures:
        - x86_64
      # Hard ceiling on concurrent executions: a request flood is throttled
      # (429) at this limit instead of fanning out into unbounded invocations.
      # Omitted when ReservedConcurrency is 0 (the default) — see the parameter.
      ReservedConcurrentExecutions:
        !If [HasReservedConcurrency, !Ref ReservedConcurrency, !Ref "AWS::NoValue"]
      Environment:
        Variables:
          CONFERENCE_DATABASE_URL: !Sub "postgresql+pg8000://${DBUsername}:${DBPassword}@${Database.Endpoint.Address}:${Database.Endpoint.Port}/${DBName}"
          # Empty unless GaMeasurementId is set; web.app injects the GA snippet
          # only when this is a valid G-XXXX id, so analytics is AWS-only.
          CONFERENCE_GA_ID: !Ref GaMeasurementId
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
        SubnetIds: !Ref SubnetIds
      # AWS_IAM (not NONE): the Function URL is reachable only by callers that can
      # sign requests. CloudFront does so via the Origin Access Control below, so
      # the function can no longer be hit directly at its lambda-url host — all
      # public traffic comes through the CloudFront distribution (and, later, the
      # custom domain). FunctionUrlCloudFrontPermission grants that one caller.
      FunctionUrlConfig:
        AuthType: AWS_IAM
        Cors:
          AllowOrigins: ["*"]
          AllowMethods: ["GET", "POST"]

  # Lets CloudFront (and only CloudFront, scoped to this distribution) invoke the
  # IAM-protected Function URL. Pairs with the OAC's SigV4 request signing.
  FunctionUrlCloudFrontPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ConferenceFunction
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      FunctionUrlAuthType: AWS_IAM
      SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  # Since October 2025, CloudFront OAC to a Lambda Function URL requires
  # lambda:InvokeFunction IN ADDITION to lambda:InvokeFunctionUrl above. Without
  # this second grant, CloudFront's signed origin request is rejected with a 403
  # AccessDeniedException even though every other piece is configured correctly.
  FunctionCloudFrontInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ConferenceFunction
      Action: lambda:InvokeFunction
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  # Origin Access Control: CloudFront signs each origin request (SigV4) as the
  # "lambda" origin type, satisfying the Function URL's AWS_IAM auth so the URL
  # need not be public.
  FunctionUrlOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-func-url-oac"
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  # Rate-based WAF in front of CloudFront. The default action is Allow; any single
  # client IP that exceeds WafRateLimitPer5Min requests in a rolling 5-minute
  # window is blocked until its rate falls back under the threshold. Scope must be
  # CLOUDFRONT, which requires this stack to be deployed in us-east-1.
  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-rate-limit"
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}-webacl"
      Rules:
        - Name: RateLimitPerIp
          Priority: 0
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref WafRateLimitPer5Min
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-rate-limit"

  # Custom cache policy: cache responses by full query string (so each distinct
  # search is its own cache entry) while honoring the origin's Cache-Control.
  # MinTTL 0 means the no-cache responses (the table shell and the .ics feed)
  # are never cached, but /api/search and /api/fields — which now send a short
  # max-age — are served from the edge, so a loop of identical queries hits the
  # cache instead of waking the Lambda.
  SearchCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${AWS::StackName}-cache"
        MinTTL: 0
        DefaultTTL: 300
        MaxTTL: 3600
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: all

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        WebACLId: !GetAtt WebAcl.Arn
        Enabled: true
        Comment: !Sub "${AWS::StackName} web (FastAPI via Lambda Function URL)"
        # PriceClass_100 = North America + Europe edges only (cheapest). Bump to
        # PriceClass_All for global low latency.
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        IPV6Enabled: true
        # Present only when a custom domain is configured; otherwise the default
        # *.cloudfront.net name (and its certificate) is used.
        Aliases: !If [HasCustomDomain, [!Ref DomainName], !Ref "AWS::NoValue"]
        Origins:
          - Id: LambdaFunctionUrl
            # The Function URL's host, stripped of scheme and trailing slash:
            # https://<id>.lambda-url.<region>.on.aws/ -> <id>.lambda-url...on.aws
            DomainName: !Select [2, !Split ["/", !GetAtt ConferenceFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !GetAtt FunctionUrlOAC.Id
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: LambdaFunctionUrl
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          # Custom cache policy (SearchCachePolicy): caches by full query string
          # and honors the origin's Cache-Control. The dynamic responses (table
          # shell, .ics feed) send no-cache and so are never cached; /api/search
          # and /api/fields send a short max-age and so are served from the edge,
          # shielding the Lambda from a loop of identical queries.
          CachePolicyId: !Ref SearchCachePolicy
          # AllViewerExceptHostHeader: forward everything the viewer sent EXCEPT
          # Host. The Function URL rejects a mismatched Host, and OAC re-signs
          # with the origin host, so the viewer Host must be dropped here.
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

  # Monthly cost guardrail. Created only when AlertEmail is set. It emails on two
  # triggers: ACTUAL spend reaching 80% of MonthlyBudgetUsd (early warning) and
  # FORECASTED spend reaching 100% (AWS projects the month will blow the budget,
  # often days before it actually does). Budgets are a global/account resource;
  # the threshold covers the whole account, not just this stack.
  CostBudget:
    Type: AWS::Budgets::Budget
    Condition: HasAlertEmail
    Properties:
      Budget:
        BudgetName: !Sub "${AWS::StackName}-monthly"
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUsd
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref AlertEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref AlertEmail

  # ---------------------------------------------------------------------------
  # Scheduled refresh (EventBridge Scheduler -> Lambda), replacing the retired
  # GitHub Actions cron. Everything below is created only when
  # EnableScheduledRefresh is "true". The refresh Lambda must reach BOTH the RDS
  # database (in-VPC) AND the Anthropic API (internet); a VPC Lambda has no
  # internet route without a NAT gateway, so we add one. All of it is torn down
  # with the stack, so it costs nothing at rest.
  # ---------------------------------------------------------------------------

  # Elastic IP for the NAT gateway.
  NatEip:
    Type: AWS::EC2::EIP
    Condition: ScheduledRefresh
    Properties:
      Domain: vpc

  # NAT gateway placed in the FIRST provided subnet, which in a default VPC has a
  # route to the internet gateway (a NAT gateway must sit in an internet-facing
  # subnet to function).
  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: ScheduledRefresh
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Select [0, !Ref SubnetIds]

  # A route table whose default route points at the NAT, associated with the
  # SECOND provided subnet — where the refresh Lambda runs. Reaching RDS uses the
  # VPC's implicit local route (works from any subnet); only outbound internet
  # needs the NAT. The Lambda's subnet must differ from the NAT's subnet so its
  # 0.0.0.0/0 resolves to the NAT rather than looping. Deleting this association
  # on teardown reverts the subnet to the VPC's main route table.
  RefreshRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: ScheduledRefresh
    Properties:
      VpcId: !Ref VpcId

  RefreshDefaultRoute:
    Type: AWS::EC2::Route
    Condition: ScheduledRefresh
    Properties:
      RouteTableId: !Ref RefreshRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  RefreshSubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: ScheduledRefresh
    Properties:
      RouteTableId: !Ref RefreshRouteTable
      SubnetId: !Select [1, !Ref SubnetIds]

  RefreshSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: ScheduledRefresh
    Properties:
      GroupDescription: conference-agent scheduled-refresh Lambda egress
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all egress (RDS in-VPC + Anthropic API via the NAT)

  # Let the refresh Lambda reach PostgreSQL, scoped to its security group.
  DBIngressFromRefresh:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: ScheduledRefresh
    Properties:
      GroupId: !GetAtt DBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !GetAtt RefreshSecurityGroup.GroupId
      Description: PostgreSQL from the scheduled-refresh Lambda

  RefreshFunction:
    Type: AWS::Serverless::Function
    Condition: ScheduledRefresh
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../
      Handler: web.refresh_handler.handler
      Description: Scheduled conference discovery refresh (replaces the GitHub Actions cron).
      Architectures:
        - x86_64
      # Discovery (web search + LLM extraction) is slow; give it the Lambda max
      # and extra memory. A very large field set may still exceed 15 min — keep
      # each schedule's cadence scoped (weekly flagship / monthly rest).
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          CONFERENCE_DATABASE_URL: !Sub "postgresql+pg8000://${DBUsername}:${DBPassword}@${Database.Endpoint.Address}:${Database.Endpoint.Port}/${DBName}"
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt RefreshSecurityGroup.GroupId
        SubnetIds:
          - !Select [1, !Ref SubnetIds]

  # Role EventBridge Scheduler assumes to invoke the refresh Lambda. Scoped to
  # the scheduler service and this account; grants only InvokeFunction on the
  # refresh function.
  SchedulerInvokeRole:
    Type: AWS::IAM::Role
    Condition: ScheduledRefresh
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: InvokeRefreshFunction
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt RefreshFunction.Arn
                  - !Sub "${RefreshFunction.Arn}:*"

  WeeklyRefreshSchedule:
    Type: AWS::Scheduler::Schedule
    Condition: ScheduledRefresh
    Properties:
      Name: !Sub "${AWS::StackName}-weekly-refresh"
      Description: Weekly flagship-field conference refresh.
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref RefreshWeeklyScheduleExpression
      ScheduleExpressionTimezone: UTC
      Target:
        Arn: !GetAtt RefreshFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn
        Input: '{"cadence": "weekly"}'

  MonthlyRefreshSchedule:
    Type: AWS::Scheduler::Schedule
    Condition: ScheduledRefresh
    Properties:
      Name: !Sub "${AWS::StackName}-monthly-refresh"
      Description: Monthly refresh of the remaining fields.
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref RefreshMonthlyScheduleExpression
      ScheduleExpressionTimezone: UTC
      Target:
        Arn: !GetAtt RefreshFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn
        Input: '{"cadence": "monthly"}'

  DailyDueRefreshSchedule:
    Type: AWS::Scheduler::Schedule
    Condition: ScheduledRefresh
    Properties:
      Name: !Sub "${AWS::StackName}-daily-due-refresh"
      Description: Daily targeted auto-check of series due for re-discovery.
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref RefreshDailyScheduleExpression
      ScheduleExpressionTimezone: UTC
      Target:
        Arn: !GetAtt RefreshFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn
        Input: '{"cadence": "due"}'

Outputs:
  WebsiteUrl:
    Description: Public URL of the conference-agent website and REST API.
    Value: !If
      - HasCustomDomain
      - !Sub "https://${DomainName}/"
      - !Sub "https://${Distribution.DomainName}/"
  CloudFrontDomainName:
    Description: >
      The CloudFront distribution domain. Point a custom domain's DNS (Route 53
      alias or a CNAME) at this value, then redeploy with DomainName +
      AcmCertificateArn set.
    Value: !GetAtt Distribution.DomainName
  DatabaseEndpoint:
    Description: RDS endpoint host.
    Value: !GetAtt Database.Endpoint.Address
  DatabaseUrlHint:
    Description: SQLAlchemy URL to use for loading data (fill in the password).
    Value: !Sub "postgresql+psycopg://${DBUsername}:<password>@${Database.Endpoint.Address}:${Database.Endpoint.Port}/${DBName}"
  RefreshFunctionName:
    Condition: ScheduledRefresh
    Description: >
      Name of the scheduled-refresh Lambda. Invoke it on demand with, e.g.,
      `aws lambda invoke --function-name <this> --payload '{"cadence":"weekly"}' out.json`.
    Value: !Ref RefreshFunction
