name: Weekly conference refresh (flagship fields)

on:
  # schedule:
    # 07:00 UTC every Monday. Refreshes the flagship, fast-moving fields
    # (config.WEEKLY_CATEGORIES). Enable by uncommenting (and supply the secrets
    # below in the repo settings).
    # - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[discover]"

      - name: Refresh flagship fields
        env:
          # Required for discovery.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: a persistent database URL (e.g. hosted Postgres) keeps
          # results across runs. Without it, a local SQLite file is produced and
          # uploaded as an artifact below.
          CONFERENCE_DATABASE_URL: ${{ secrets.CONFERENCE_DATABASE_URL }}
          # Optional: SMTP settings enable the "table refreshed" email.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          CONFERENCE_NOTIFY_EMAIL: ${{ secrets.CONFERENCE_NOTIFY_EMAIL }}
        run: |
          mkdir -p data
          python scripts/daily_update.py --cadence weekly --backend api

      - name: Upload database artifact
        # When no persistent CONFERENCE_DATABASE_URL is set, the run writes a
        # local SQLite file; preserve it as an artifact so the refresh is not lost.
        if: ${{ env.CONFERENCE_DATABASE_URL == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: conferences-db
          path: data/*.db
          if-no-files-found: ignore
          retention-days: 14
